<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>班級遲到統計系統</title>
<style>
body{
  font-family:"Microsoft JhengHei",sans-serif;
  background:#f4f6f8;
  padding:20px;
}
h1{text-align:center}
.card{
  background:white;
  padding:20px;
  margin:15px auto;
  max-width:1100px;
  border-radius:14px;
  box-shadow:0 3px 10px #0002;
}
.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:10px;
}
button{
  padding:10px;
  border:0;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}
.num{background:#e0e0e0}
.late{background:#ffb74d;font-weight:bold}
.pending{background:#90caf9;font-weight:bold}
.save{background:#1976d2;color:white;font-weight:bold;margin-top:20px}
.yellow{background:#fdd835!important;color:#000;font-weight:bold}
.red{background:#e53935!important;color:white;font-weight:bold}
input{padding:8px;font-size:16px}
table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{border:1px solid #ccc;padding:8px;text-align:center}
.note{color:#555;line-height:1.8}
.warning{color:#e53935;font-weight:bold}
</style>
</head>

<body>

<h1>班級遲到統計系統</h1>

<div class="card">
  <h2>選擇日期</h2>
  <input type="date" id="datePicker">
  <button onclick="toggleHoliday()">切換假日 / 上課日</button>
  <p id="holidayText"></p>
</div>

<div class="card">
  <h2>今日遲到點選</h2>
  <p class="note">先點選今天遲到的座號，全部點完後再按「確認送出」。</p>
  <div id="studentButtons" class="grid"></div>

  <h3>保留待定學生</h3>
  <p class="note">若學生當天情況特殊，可設為保留待定，該日不列入該生連續遲到計算。</p>
  <div id="pendingButtons" class="grid"></div>
</div>

<div class="card">
  <h2>兩日遲到警示：黃燈區</h2>
  <p class="note">當日與前一個上課日連續遲到者會顯示在這裡。</p>
  <div id="yellowList"></div>
</div>

<div class="card">
  <h2>三日遲到警示：紅燈區</h2>
  <p class="note">連續三個上課日遲到者會顯示在這裡，並可標記是否已處罰。</p>
  <div id="redList"></div>
</div>

<div class="card">
  <h2>全班處罰次數統計</h2>
  <table>
    <thead>
      <tr>
        <th>座號</th>
        <th>處罰次數</th>
        <th>狀態</th>
      </tr>
    </thead>
    <tbody id="punishTable"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const ADMIN_PASSWORD = "55660526";

const firebaseConfig = {
  apiKey: "AIzaSyD60CAmUvj52wScu7CFADKdRz4KFPR_YZU",
  authDomain: "rollcall-dd142.firebaseapp.com",
  databaseURL: "https://rollcall-dd142-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rollcall-dd142",
  storageBucket: "rollcall-dd142.firebasestorage.app",
  messagingSenderId: "748386138282",
  appId: "1:748386138282:web:1596eb6fce8839908638d3",
  measurementId: "G-9BPCT93DX7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const className = "class-2-2";
const studentCount = 40;

let selectedDate = getTodayString();
let allLateData = {};
let punishmentData = {};
let tempLateList = [];
let tempPendingList = [];

const datePicker = document.getElementById("datePicker");
datePicker.value = selectedDate;

datePicker.addEventListener("change", () => {
  selectedDate = datePicker.value;
  tempLateList = [];
  tempPendingList = [];
  renderAll();
});

function checkPassword(){
  const pw = prompt("請輸入幹部密碼");
  return pw === ADMIN_PASSWORD;
}

function getTodayString(){
  const d = new Date();
  return formatDateLocal(d);
}

function formatDateLocal(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function getDateOffset(dateStr, offset){
  const [y, m, d] = dateStr.split("-").map(Number);
  const date = new Date(y, m - 1, d);
  date.setDate(date.getDate() + offset);
  return formatDateLocal(date);
}

function isWeekend(dateStr){
  const d = new Date(dateStr + "T00:00:00");
  const day = d.getDay();
  return day === 0 || day === 6;
}

function isHoliday(dateStr){
  const data = allLateData[dateStr];

  if(data && data.holiday !== undefined){
    return data.holiday === true;
  }

  return isWeekend(dateStr);
}

function getLateList(date){
  return allLateData[date]?.late || [];
}

function getPendingList(date){
  return allLateData[date]?.pending || [];
}

function isPending(date, studentNum){
  return getPendingList(date).includes(studentNum);
}

function getStudentSchoolDays(endDate, studentNum, needDays){
  const days = [];
  let date = endDate;

  while(days.length < needDays){
    if(!isHoliday(date) && !isPending(date, studentNum)){
      days.push(date);
    }
    date = getDateOffset(date, -1);
  }

  return days;
}

function getNormalSchoolDays(endDate, needDays){
  const days = [];
  let date = endDate;

  while(days.length < needDays){
    if(!isHoliday(date)){
      days.push(date);
    }
    date = getDateOffset(date, -1);
  }

  return days;
}

async function saveDateData(date, data){
  if(!checkPassword()){
    alert("密碼錯誤，未儲存。");
    return;
  }

  await set(ref(db, `lateData/${className}/${date}`), data);
  alert("已儲存！");
}

window.toggleHoliday = async function(){
  const current = allLateData[selectedDate] || {
    late: [],
    pending: [],
    holiday: isWeekend(selectedDate)
  };

  const newData = {
    late: current.late || [],
    pending: current.pending || [],
    holiday: !isHoliday(selectedDate)
  };

  await saveDateData(selectedDate, newData);
}

function renderHoliday(){
  const text = document.getElementById("holidayText");
  const weekendText = isWeekend(selectedDate) ? "系統判斷為星期六或星期日。" : "系統判斷為平日。";

  if(isHoliday(selectedDate)){
    text.innerHTML = `<span class="warning">${selectedDate} 是假日，不列入連續天數計算。</span><br>${weekendText}`;
  }else{
    text.innerHTML = `${selectedDate} 是上課日，會列入連續天數計算。<br>${weekendText}`;
  }
}

function renderButtons(){
  const area = document.getElementById("studentButtons");
  const pendingArea = document.getElementById("pendingButtons");

  area.innerHTML = "";
  pendingArea.innerHTML = "";

  const data = allLateData[selectedDate] || {
    late: [],
    pending: [],
    holiday: isWeekend(selectedDate)
  };

  if(tempLateList.length === 0){
    tempLateList = [...(data.late || [])];
  }

  if(tempPendingList.length === 0){
    tempPendingList = [...(data.pending || [])];
  }

  for(let i=1;i<=studentCount;i++){
    const btn = document.createElement("button");
    btn.textContent = i + "號";
    btn.className = "num";

    if(tempLateList.includes(i)){
      btn.classList.add("late");
    }

    btn.onclick = () => {
      if(tempLateList.includes(i)){
        tempLateList = tempLateList.filter(n => n !== i);
      }else{
        tempLateList.push(i);
      }

      tempLateList.sort((a,b)=>a-b);
      renderButtons();
    };

    area.appendChild(btn);
  }

  for(let i=1;i<=studentCount;i++){
    const btn = document.createElement("button");
    btn.textContent = i + "號";
    btn.className = "num";

    if(tempPendingList.includes(i)){
      btn.classList.add("pending");
    }

    btn.onclick = () => {
      if(tempPendingList.includes(i)){
        tempPendingList = tempPendingList.filter(n => n !== i);
      }else{
        tempPendingList.push(i);
      }

      tempPendingList.sort((a,b)=>a-b);
      renderButtons();
    };

    pendingArea.appendChild(btn);
  }

  const saveBtn = document.createElement("button");
  saveBtn.textContent = "確認送出";
  saveBtn.className = "save";

  saveBtn.onclick = async () => {
    const newData = {
      late: tempLateList,
      pending: tempPendingList,
      holiday: isHoliday(selectedDate)
    };

    await saveDateData(selectedDate, newData);
  };

  pendingArea.appendChild(document.createElement("br"));
  pendingArea.appendChild(saveBtn);
}

function getLateWarningStudents(){
  const yellowStudents = [];
  const redStudents = [];
  const yellowDatesMap = {};
  const redDatesMap = {};

  for(let i=1;i<=studentCount;i++){
    const yellowDays = getStudentSchoolDays(selectedDate, i, 2);
    const redDays = getStudentSchoolDays(selectedDate, i, 3);

    const yellowLate = yellowDays.every(date => getLateList(date).includes(i));
    const redLate = redDays.every(date => getLateList(date).includes(i));

    if(redLate){
      redStudents.push(i);
      redDatesMap[i] = redDays;
    }else if(yellowLate){
      yellowStudents.push(i);
      yellowDatesMap[i] = yellowDays;
    }
  }

  return {
    normalSchoolDays: getNormalSchoolDays(selectedDate, 3),
    yellowStudents,
    redStudents,
    yellowDatesMap,
    redDatesMap
  };
}

function renderYellowList(){
  const area = document.getElementById("yellowList");
  const { yellowStudents, yellowDatesMap } = getLateWarningStudents();

  const sampleDays = getStudentSchoolDays(selectedDate, 1, 2);

if(yellowStudents.length === 0){
  area.innerHTML = `
    <p>目前沒有兩日遲到黃燈警示。</p>
    <p class="note">目前系統預設計算日期：${sampleDays.join("、")}</p>
  `;
  return;
}

  let html = `<table>
    <tr>
      <th>座號</th>
      <th>連續遲到日期</th>
      <th>警示</th>
    </tr>`;

  yellowStudents.forEach(num => {
    html += `
      <tr>
        <td class="yellow">${num}號</td>
        <td>${yellowDatesMap[num].join("、")}</td>
        <td>黃燈提醒</td>
      </tr>`;
  });

  html += "</table>";
  area.innerHTML = html;
}

function renderRedList(){
  const area = document.getElementById("redList");
  const { redStudents, redDatesMap } = getLateWarningStudents();

  if(redStudents.length === 0){
    area.innerHTML = "<p>目前沒有三日遲到紅燈警示。</p>";
    return;
  }

  let html = `<table>
    <tr>
      <th>座號</th>
      <th>連續遲到日期</th>
      <th>處罰狀態</th>
      <th>操作</th>
    </tr>`;

  redStudents.forEach(num => {
    const key = `${redDatesMap[num].join("_")}_${num}`;
    const record = punishmentData[key];
    const punished = record?.status === "punished";

    html += `
      <tr>
        <td class="red">${num}號</td>
        <td>${redDatesMap[num].join("、")}</td>
        <td>${punished ? "已處罰" : "未處罰"}</td>
        <td>
          <button onclick="setPunishment(${num}, '${key}', '${punished ? "unpunished" : "punished"}')">
            ${punished ? "改回未處罰" : "標記已處罰"}
          </button>
        </td>
      </tr>`;
  });

  html += "</table>";
  area.innerHTML = html;
}

window.setPunishment = async function(num, key, status){
  if(!checkPassword()){
    alert("密碼錯誤，未儲存。");
    return;
  }

  const redDays = getStudentSchoolDays(selectedDate, num, 3);

  await set(ref(db, `punishments/${className}/${key}`), {
    student: num,
    endDate: selectedDate,
    schoolDays: redDays,
    status: status,
    updatedAt: new Date().toISOString()
  });

  alert("處罰狀態已更新！");
}

function renderPunishTable(){
  const tbody = document.getElementById("punishTable");
  tbody.innerHTML = "";

  for(let i=1;i<=studentCount;i++){
    const count = Object.values(punishmentData).filter(r =>
      r.student === i && r.status === "punished"
    ).length;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i}號</td>
      <td>${count}</td>
      <td>${count > 0 ? "已有處罰紀錄" : "無處罰紀錄"}</td>
    `;
    tbody.appendChild(tr);
  }
}

function renderAll(){
  renderHoliday();
  renderButtons();
  renderYellowList();
  renderRedList();
  renderPunishTable();
}

onValue(ref(db, `lateData/${className}`), snapshot => {
  allLateData = snapshot.val() || {};
  tempLateList = [];
  tempPendingList = [];
  renderAll();
});

onValue(ref(db, `punishments/${className}`), snapshot => {
  punishmentData = snapshot.val() || {};
  renderAll();
});
</script>

</body>
</html>
