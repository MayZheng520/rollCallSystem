<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>班級遲到統計系統</title>
<style>
body{font-family:"Microsoft JhengHei",sans-serif;background:#f4f6f8;padding:20px}
.card{background:white;padding:20px;margin:15px auto;max-width:1000px;border-radius:14px;box-shadow:0 3px 10px #0002}
h1{text-align:center}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px}
button{padding:10px;border:0;border-radius:8px;cursor:pointer;font-size:16px}
.num{background:#e0e0e0}
.late{background:#ffb74d;font-weight:bold}
.red{background:#e53935!important;color:white;font-weight:bold}
.green{background:#66bb6a;color:white}
.gray{background:#9e9e9e;color:white}
input{padding:8px;font-size:16px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ccc;padding:8px;text-align:center}
.warning{color:#e53935;font-weight:bold}
</style>
</head>
<body>

<h1>班級遲到統計系統</h1>

<div class="card">
  <h2>選擇日期</h2>
  <input type="date" id="datePicker">
  <button onclick="toggleHoliday()">切換假日 / 上課日</button>
  <p id="holidayText"></p>
</div>

<div class="card">
  <h2>今日遲到點選</h2>
  <p>每次修改都需要輸入密碼。</p>
  <div id="studentButtons" class="grid"></div>
</div>

<div class="card">
  <h2>連續三個上課日遲到警示</h2>
  <p id="schoolDaysText"></p>
  <div id="redList"></div>
</div>

<div class="card">
  <h2>全班處罰次數統計</h2>
  <table>
    <thead>
      <tr>
        <th>座號</th>
        <th>處罰次數</th>
        <th>狀態</th>
      </tr>
    </thead>
    <tbody id="punishTable"></tbody>
  </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const ADMIN_PASSWORD = "55660526";

const firebaseConfig = {
  apiKey: "AIzaSyD60CAmUvj52wScu7CFADKdRz4KFPR_YZU",
  authDomain: "rollcall-dd142.firebaseapp.com",
  databaseURL: "https://rollcall-dd142-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rollcall-dd142",
  storageBucket: "rollcall-dd142.firebasestorage.app",
  messagingSenderId: "748386138282",
  appId: "1:748386138282:web:1596eb6fce8839908638d3",
  measurementId: "G-9BPCT93DX7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const className = "class-2-2";
const studentCount = 40;

let selectedDate = new Date().toISOString().slice(0,10);
let allLateData = {};
let punishmentData = {};
let tempLateList = [];

const datePicker = document.getElementById("datePicker");
datePicker.value = selectedDate;

datePicker.addEventListener("change", () => {
  selectedDate = datePicker.value;
  tempLateList = [];
  renderAll();
});

function checkPassword(){
  const pw = prompt("請輸入幹部密碼");
  return pw === ADMIN_PASSWORD;
}

function getDateOffset(dateStr, offset){
  const d = new Date(dateStr);
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}

function getSchoolDays(endDate){
  const days = [];
  let date = endDate;

  while(days.length < 3){
    const data = allLateData[date] || {};
    if(data.holiday !== true){
      days.push(date);
    }
    date = getDateOffset(date, -1);
  }

  return days;
}

function getLateList(date){
  return allLateData[date]?.late || [];
}

async function saveDateData(date, data){
  if(!checkPassword()) {
    alert("密碼錯誤，未儲存。");
    return;
  }
  await set(ref(db, `lateData/${className}/${date}`), data);
}

window.toggleHoliday = async function(){
  const data = allLateData[selectedDate] || { late: [], holiday: false };
  data.holiday = !data.holiday;
  await saveDateData(selectedDate, data);
}
function renderButtons(){
  const area = document.getElementById("studentButtons");
  area.innerHTML = "";

  const data = allLateData[selectedDate] || { late: [], holiday: false };

  if(tempLateList.length === 0){
    tempLateList = [...(data.late || [])];
  }

  for(let i=1;i<=studentCount;i++){
    const btn = document.createElement("button");

    btn.textContent = i + "號";
    btn.className = "num";

    if(tempLateList.includes(i)){
      btn.classList.add("late");
    }

    btn.onclick = () => {

      if(tempLateList.includes(i)){
        tempLateList = tempLateList.filter(n => n !== i);
      }else{
        tempLateList.push(i);
      }

      tempLateList.sort((a,b)=>a-b);

      renderButtons();
    };

    area.appendChild(btn);
  }

  const saveBtn = document.createElement("button");

  saveBtn.textContent = "確認送出";
  saveBtn.style.marginTop = "20px";
  saveBtn.style.background = "#1976d2";
  saveBtn.style.color = "white";
  saveBtn.style.fontWeight = "bold";

  saveBtn.onclick = async () => {

    if(!checkPassword()){
      alert("密碼錯誤");
      return;
    }

    const newData = allLateData[selectedDate] || {
      late: [],
      holiday: false
    };

    newData.late = tempLateList;

    await set(
      ref(db, `lateData/${className}/${selectedDate}`),
      newData
    );

    alert("已儲存！");
  };

  area.appendChild(document.createElement("br"));
  area.appendChild(saveBtn);
}


function renderHoliday(){
  const data = allLateData[selectedDate] || {};
  const text = document.getElementById("holidayText");

  if(data.holiday === true){
    text.innerHTML = `<span class="warning">${selectedDate} 是假日，不列入連續三天計算。</span>`;
  }else{
    text.innerHTML = `${selectedDate} 是上課日，會列入連續三天計算。`;
  }
}

function renderRedList(){
  const area = document.getElementById("redList");
  const schoolDays = getSchoolDays(selectedDate);

  document.getElementById("schoolDaysText").innerHTML =
    `目前計算的三個上課日：<b>${schoolDays.join("、")}</b>`;

  const redStudents = [];

  for(let i=1;i<=studentCount;i++){
    const isLateAll = schoolDays.every(date => getLateList(date).includes(i));
    if(isLateAll) redStudents.push(i);
  }

  if(redStudents.length === 0){
    area.innerHTML = "<p>目前沒有連續三個上課日遲到的同學。</p>";
    return;
  }

  let html = `<table>
    <tr>
      <th>座號</th>
      <th>連續遲到日期</th>
      <th>處罰狀態</th>
      <th>操作</th>
    </tr>`;

  redStudents.forEach(num => {
    const key = `${selectedDate}_${num}`;
    const record = punishmentData[key];
    const punished = record?.status === "punished";

    html += `
      <tr>
        <td class="red">${num}號</td>
        <td>${schoolDays.join("、")}</td>
        <td>${punished ? "已處罰" : "未處罰"}</td>
        <td>
          <button onclick="setPunishment(${num}, '${key}', '${punished ? "unpunished" : "punished"}')">
            ${punished ? "改回未處罰" : "標記已處罰"}
          </button>
        </td>
      </tr>`;
  });

  html += "</table>";
  area.innerHTML = html;
}

window.setPunishment = async function(num, key, status){
  if(!checkPassword()){
    alert("密碼錯誤，未儲存。");
    return;
  }

  const schoolDays = getSchoolDays(selectedDate);

  await set(ref(db, `punishments/${className}/${key}`), {
    student: num,
    endDate: selectedDate,
    schoolDays: schoolDays,
    status: status,
    updatedAt: new Date().toISOString()
  });
}

function renderPunishTable(){
  const tbody = document.getElementById("punishTable");
  tbody.innerHTML = "";

  for(let i=1;i<=studentCount;i++){
    const count = Object.values(punishmentData).filter(r =>
      r.student === i && r.status === "punished"
    ).length;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i}號</td>
      <td>${count}</td>
      <td>${count > 0 ? "已有處罰紀錄" : "無處罰紀錄"}</td>
    `;
    tbody.appendChild(tr);
  }
}

function renderAll(){
  renderHoliday();
  renderButtons();
  renderRedList();
  renderPunishTable();
}

onValue(ref(db, `lateData/${className}`), snapshot => {
  allLateData = snapshot.val() || {};
  renderAll();
});

onValue(ref(db, `punishments/${className}`), snapshot => {
  punishmentData = snapshot.val() || {};
  renderAll();
});
</script>

</body>
</html>
